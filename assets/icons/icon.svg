<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FinCalc icon">
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="#2563EB"/>

  <!-- Chart bars (finance motif) -->
  <!-- Bar 1 (shortest) -->
  <rect x="72" y="320" width="72" height="120" rx="12" fill="rgba(255,255,255,0.35)"/>
  <!-- Bar 2 (medium) -->
  <rect x="176" y="240" width="72" height="200" rx="12" fill="rgba(255,255,255,0.55)"/>
  <!-- Bar 3 (tall) -->
  <rect x="280" y="160" width="72" height="280" rx="12" fill="rgba(255,255,255,0.75)"/>
  <!-- Bar 4 (tallest) -->
  <rect x="384" y="80" width="72" height="360" rx="12" fill="#ffffff"/>

  <!-- Trend line over bars -->
  <polyline
    points="108,300 212,220 316,140 420,60"
    fill="none"
    stroke="rgba(255,255,255,0.9)"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dot at trend line end -->
  <circle cx="420" cy="60" r="18" fill="#ffffff"/>
</svg>
